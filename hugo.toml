baseURL = "https://esuyoonn.github.io/"
title = "Dongyoung Yoon"
languageCode = "en"
defaultContentLanguage = "en"
paginate = 10

[module]
  [module.hugoVersion]
    extended = true
    min = "0.150.0"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[menu]
  [[menu.main]]
    identifier = "research"
    name = "Research"
    url = "/research/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30

[params]
  [params.neso]
    time_format                        = "January 2006"
    disable_responsive_menu            = false
    ext_link_indicator                 = false
    ext_link_no_opener_referrer        = true
    ext_link_new_window                = true
    show_full_content_in_rss           = false
    archive_includes_all_sections      = false
    disable_scroll_to_top              = false
    footer_text                        = ""
    hide_copyright                     = true
    hide_footer                        = false
    force_color_scheme                 = false
    display_short_lang_name            = false
    support_theme_author               = false

    [params.neso.branding]
      logo_text                        = "Dongyoung Yoon"
      hide_logo_text                   = false
      og_image                         = ""
      favicon_ico                      = ""

    [params.neso.social]
      [[params.neso.social.links]]
        name                           = "Github"
        url                            = "https://github.com/esuyoonn"
      [[params.neso.social.links]]
        name                           = "LinkedIn"
        url                            = "https://linkedin.com/in/dongyoung-yoon"
      [[params.neso.social.links]]
        name                           = "Email"
        url                            = "mailto:ydy9208@yonsei.ac.kr"

    [params.neso.home]
      display_mode                     = "intro"
      [params.neso.home.list]
        featured_entries_limit         = 0
        hide_view_archives_cta         = true

    [params.neso.list]
      provide_rss_for_each_list        = false
      prominent_first_entry            = false
      hide_page_nums                   = false
      hide_summary                     = false
      hide_cover_image                 = false

    [params.neso.page]
      ext_link_indicator               = false
      ext_link_no_opener_referrer      = true
      ext_link_new_window              = true
      show_breadcrumbs                 = true
      hide_description_in_single       = true
      hide_metadata                    = true
      show_reading_time                = false
      show_word_count                  = false
      show_author                      = false
      show_canonical_link              = false
      show_toc                         = false
      show_prev_next                   = false
      show_share                       = false
      show_content_footer              = false
      enable_comments                  = false
      hide_copy_code_button            = false

    [params.neso.seo]
      block_indexing                   = false
      site_description                 = "Undergraduate researcher at Yonsei University, focused on computational biology, computer vision, and AI-driven biomedical applications."
      site_keywords                    = ["computational biology", "computer vision", "AI", "biomedical", "deep learning"]
      site_author                      = ["Dongyoung Yoon"]
      [params.neso.seo.schema]
        publisher_type                 = "Person"

    [params.neso.search]
      is_case_sensitive                = false
      keys                             = ["title", "permalink", "summary", "content"]
      ignore_location                  = true
      threshold                        = 0.3
      limit                            = 10
      input_placeholder                = "Title or keyword..."

    [params.neso.assets]
      output_dir                       = ""
      disable_fingerprinting           = false
